name: Update cabin calendar

on:
  workflow_dispatch:        # manual run from the Actions tab
  schedule:
    # Every 15 minutes (UTC). Note: GitHub's scheduler is not precise and can be
    # delayed by 20-30+ min under load; it never runs tighter than ~5 min anyway.
    - cron: "*/15 * * * *"

permissions:
  contents: write           # to push the updated hytte.ics

concurrency:
  # Avoid overlapping runs if one gets delayed.
  group: update-calendar
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Restore storage_state (returning-visitor cookies)
        uses: actions/cache@v4
        with:
          path: storage_state.json
          # New key each run + prefix restore = always rolls the latest state.
          key: finn-storage-${{ github.run_id }}
          restore-keys: |
            finn-storage-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Generate hytte.ics
        env:
          # Optional proxy fallback against datacenter-IP blocks. Set as a repo secret.
          FINN_PROXY: ${{ secrets.FINN_PROXY }}
        run: python finn_ical.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hytte.ics
          if git diff --staged --quiet; then
            echo "No change in hytte.ics - skipping commit."
          else
            git commit -m "Update hytte.ics ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
